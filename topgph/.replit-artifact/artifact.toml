kind = "web"
previewPath = "/"
title = "TOP-G Tech & Construction"
version = "1.0.0"
id = "artifacts/topgph-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21936

[services.development]
run = "pnpm --filter @workspace/topgph-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/topgph-website", "run", "build" ]
publicDir = "artifacts/topgph-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21936"
BASE_PATH = "/"
